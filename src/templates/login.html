<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jupiter_eletro — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo span { font-size: 48px; }
        .logo h1 { font-size: 18px; color: #333; margin-top: 8px; }
        .logo p { font-size: 13px; color: #999; margin-top: 4px; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 12px;
        }
        input:focus { outline: none; border-color: #FFE600; }
        .btn-login {
            background: #FFE600;
            color: #333;
            border: none;
            padding: 14px;
            width: 100%;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 4px;
        }
        .btn-login:hover { background: #f0d800; }
        .erro {
            background: #fdecea;
            color: #c0392b;
            border: 1px solid #f5a9a9;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <span>🤖</span>
        <h1>Jupiter_eletro</h1>
        <p>Painel de Administração</p>
    </div>

    {% if erro %}
    <div class="erro">❌ {{ erro }}</div>
    {% endif %}

    <form method="POST" action="/painel/login">
        <label>Usuário</label>
        <input type="text" name="usuario" placeholder="admin" required autofocus>
        <label>Senha</label>
        <input type="password" name="senha" placeholder="••••••••" required>
        <button type="submit" class="btn-login">Entrar</button>
    </form>
</div>
</body>
</html>
